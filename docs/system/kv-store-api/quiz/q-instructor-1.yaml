author: instructor
date: 2026-02-23
question: |
  一個資料庫使用**預寫式日誌 (write-ahead logging, WAL)** 搭配
  ARIES 風格的復原機制。在當機復原 (crash recovery) 過程中, 系統
  執行三個階段: **分析 (analysis)**、**重做 (redo)** 和**復原
  (undo)**。下列哪個選項正確描述了**重做階段 (redo phase)** 的目的?
options:
  - text: "重做階段僅重新套用那些從緩衝池 (buffer pool) 中遺失的已提交交易 (committed transaction)"
    explanation: |
      重做階段不區分已提交與未提交的交易。它會重放*所有*日誌中的
      更新 (不論已提交或未提交), 以將資料庫恢復到當機前的確切
      狀態。未提交的交易之後會在復原階段被回滾 (rollback)。
  - text: "重做階段從最近的檢查點 (checkpoint) 開始, 重放所有日誌中的更新 (包含已提交與未提交的), 以恢復當機前的確切狀態"
    correct: true
    explanation: |
      重做階段從最近的檢查點向前掃描 WAL, 重新套用每一筆更新,
      將所有頁面恢復到當機前的狀態。這包含未提交交易的更新。接下來
      的復原階段會回滾在當機時仍在進行中 (尚未提交) 的交易。
  - text: "重做階段回滾未提交的交易以確保原子性 (atomicity)"
    explanation: |
      回滾未提交的交易是**復原階段 (undo phase)** 的工作, 而非
      重做階段。重做階段的任務是向前*重放*所有更新, 而非反轉它們。
  - text: "重做階段重新寫入整個 WAL 以在復原繼續前進行壓縮 (compact)"
    explanation: |
      WAL 壓縮與當機復原無關。重做階段讀取現有日誌並重新套用操作;
      它不會修改或壓縮日誌本身。
