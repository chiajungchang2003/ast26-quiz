author: instructor
date: 2026-02-23
question: |
  一個 RAID-5 陣列有 10 顆磁碟, 每顆的年故障率 (annual failure
  rate, AFR) 為 2%。在一顆磁碟故障後, 重建 (rebuild) 需要 8 小時。
  在重建期間, **第二顆**磁碟故障並導致資料遺失的機率大約是多少?
options:
  - text: "約 0.016% (大約 6,000 分之 1)"
    explanation: |
      這使用了每顆磁碟的每小時故障率, 但沒有乘以剩餘磁碟的數量。
      在 9 顆存活磁碟的情況下, 風險是 9 倍。
  - text: "約 0.015% (大約 6,700 分之 1)"
    explanation: |
      接近, 但用了 10 顆磁碟而非 9 顆存活磁碟。在一顆故障後,
      只有 9 顆可能在重建期間發生第二次故障。
  - text: "約 0.016% (大約 6,100 分之 1)"
    correct: true
    explanation: |
      每顆磁碟的每小時故障率 = $0.02 / 8760 \approx 2.28 \times 10^{-6}$。
      *某一顆特定*磁碟在 8 小時內故障的機率 = $8 \times 2.28 \times 10^{-6} \approx 1.83 \times 10^{-5}$。
      9 顆存活磁碟中*任一顆*故障的機率 = $9 \times 1.83 \times 10^{-5} \approx 1.64 \times 10^{-4}$,
      即**約 0.016%** 或大約 **6,100 分之 1**。
  - text: "約 2% (與年故障率相同)"
    explanation: |
      2% 是單顆磁碟的*年度*故障率。重建窗口僅為 8760 小時中的
      8 小時, 因此在該窗口內每顆磁碟的風險約為年度故障率的
      $8/8760 \approx 0.09\%$ — 遠低於 2%。
