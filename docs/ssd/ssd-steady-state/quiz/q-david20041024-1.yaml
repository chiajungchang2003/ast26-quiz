author: david20041024
date: 2026-03-14
question: |
  關於 QLC 與 SLC SSD 在硬體架構與運作機制上的比較，下列敘述何者最為精確？
options:
  - text: "在 QLC SSD 中，SLC Cache 是由物理上獨立、造價昂貴的 SLC 顆粒所組成"
    explanation: |
      錯誤。
      現代 QLC SSD 的 SLC Cache 通常是將原本的 QLC Cell 模擬成 SLC 模式來運作（僅使用兩個電壓層級），而非採用獨立的物理 SLC 顆粒，這樣能兼顧成本與瞬時寫入速度。
  - text: "比起QLC SSD，SLC SSD需要更多的OP空間，以應對GC的需求"
    explanation: |
      錯誤。
      QLC SSD更需要OP空間，以此降低WAF，來延長壽命。
  - text: "在同樣1TB的規格下，QLC SSD的Out-of-Band metadata area通常比SLC SSD更大"
    correct: true
    explanation: |
      正確。
      因為QLC SSD需要更強大的錯誤更正能力來應對較高的錯誤率，因此通常會配置更多的OOB空間來存儲ECC資訊，以確保資料的完整性和可靠性。
  - text: "QLC SSD因為反覆打電壓，反而提升了Retention time"
    explanation: |
      錯誤。
      QLC SSD的Retention time通常比SLC SSD更短，因為QLC Cell需要管理更多的電壓層級，這使得它們更容易受到電荷泄漏和干擾的影響，從而降低了資料的保持時間。