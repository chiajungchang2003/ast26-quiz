author: instructor
date: 2026-02-23
question: |
  TLC (Triple-Level Cell) NAND 快閃記憶體每個記憶元儲存 3 位元。
  與相同記憶元數量的 SLC (Single-Level Cell) 晶片相比, TLC 提供
  **3 倍容量**, 但耐久度 (endurance) 與效能較差。下列哪個選項最能
  解釋為何 TLC 的耐久度低於 SLC?
options:
  - text: "TLC 記憶元的物理尺寸較小, 因此磨耗較快"
    explanation: |
      記憶元尺寸取決於製程節點 (process node), 而非每個記憶元
      儲存的位元數。在相同製程下, SLC 與 TLC 的記憶元可以具有
      相同的物理尺寸。
  - text: "TLC 需要更窄的電壓邊限 (voltage margin) 來區分 8 個電壓準位, 使記憶元對反覆 P/E 循環 (program/erase cycle) 造成的電荷流失更為敏感"
    correct: true
    explanation: |
      TLC 用 $2^3 = 8$ 個電壓準位來儲存 3 位元。相鄰準位之間的
      電壓窗口比 SLC 的 2 個準位窄得多。隨著氧化層因程式化/抹除
      循環而劣化, 電荷捕捉 (charge trapping) 會使閾值電壓
      (threshold voltage) 偏移, 而較窄的邊限會更早導致讀取錯誤。
  - text: "TLC 每次寫入操作需要 3 倍的程式化/抹除循環"
    explanation: |
      TLC 並不需要 3 倍的 P/E 循環才能完成一次寫入。每個記憶元
      在每次頁面寫入 (page write) 時只會被程式化一次 (使用
      ISPP)。問題在於電壓邊限的敏感度, 而非循環倍增。
  - text: "TLC 的頁面大 3 倍, 對晶粒 (die) 造成更大的物理應力"
    explanation: |
      頁面大小 (page size) 是一個與記憶元類型無關的設計選擇。
      TLC 耐久度較低的原因來自更窄的電壓邊限, 而非頁面大小或
      機械應力。
