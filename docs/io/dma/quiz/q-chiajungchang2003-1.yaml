author: chiajungchang2003
date: 2026-04-03
question: |
   EROFS 利用 「滾動解壓縮（rolling decompression）」 方案來處理緩衝區不足的大型請求。考慮到 LZ4 演算法
   在解壓縮時需要回看（look-back）之前的數據，EROFS 如何在維持記憶體高效（僅用 16 個實體頁面）的約束下實現此功能？

options:
  - text: "利用 LZ4 僅回看最多 64KB 的特性，讓 EROFS 能夠在解壓縮流中重複使用相距超過 64KB（16 頁）的實體頁面。"
    correct: true
    explanation: |
       LZ4 解壓縮演算法最多只需要參考前 64KB 的數據來尋找重複模式。對於大型文件，EROFS 不需要為整份解壓縮數據分配
       內存，而是預分配一個固定數量的實體頁面（例如 16 頁，剛好是 64KB）。當解壓縮進度超過 64KB 時，舊的實體頁面
       所持有的數據已不再會被後續的解壓縮過程參考，因此 EROFS 可以重複利用這些物理頁面來存放後續的新數據，達成記憶體效率與解壓縮正確性的平衡。
  - text: "透過在映像檔中預留 128KB 的未壓縮「尾部（tail）」區域，讓解壓縮器永遠有參考基準。"
    explanation: |
       EROFS 採用固定大小輸出壓縮（fixed-sized output），旨在壓縮所有數據，而非依賴未壓縮的尾部。
  - text: " 將 CPU 的 L3 快取強制鎖定為臨時「暫存器（scratchpad）」，避免將中間結果寫入 DRAM。"
    explanation: |
      滾動解壓縮是一種針對實體頁面管理的系統軟體策略，並非基於 L3 快取硬體鎖定的優化。
  - text: "強制壓縮演算法每 4KB 重置一次字典（dictionary），以確保解壓縮時不跨越區塊邊界進行回看。"
    explanation: |
      如果每 4KB 就重置字典，會導致壓縮率嚴重下降（因為無法利用更長距離的重複模式）。EROFS 的優勢在於能在大範圍（如 1MB 滑動窗口）下進行壓縮，但在解壓縮時透過滾動技術節省內存。
