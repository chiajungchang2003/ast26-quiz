author: chiajungchang2003
date: 2026-05-29
question: |
  在 ext4 檔案系統中，當應用程式執行 append 4 KB 資料並呼叫 fsync() 時，關於日誌寫入量的敘述，下列何者正確？

options:
  - text: "JBD2 由於採用物理日誌，即使修改量極小，平均每次提交仍需寫入約 6 個區塊（約 24 KB）。"
    correct: true
    explanation: |
      正確。因為 JBD2 採用的物理日誌存在「粒度不匹配」（Granularity Mismatch）問題，即使僅修改 8 bytes，也必須完整寫入包含 Inode、描述及提交紀錄等區塊影像，導致平均每次提交產生約 24 KB 的日誌負擔。
  - text: "JBD2 僅需記錄 inode 修改的 8 bytes 欄位，因此物理日誌寫入量遠小於 4 KB。"
    explanation: |
      錯誤。JBD2 屬於物理日誌，其記錄單位是完整的 Block image (4 KB)。即使修改量只有幾個 bytes，它依然會複製整個 4 KB 的區塊到日誌中，導致極大的寫入開銷。
  - text: "FastCommit 為了保證安全性，依然需要將整個 4 KB 的資料區塊寫入日誌區。"
    explanation: |
      錯誤。FastCommit 的邏輯標籤（Tags）設計非常精簡，一個 append 4 KB 的操作在 FastCommit 模式下僅需 168 bytes 的日誌量，且超過 80% 的 FCLog 都能被容納在單一 4 KB 區塊中。
  - text: " FastCommit 的 FCLog 僅包含 metadata 的邏輯標籤，因此單次 append 產生的日誌量約為 4 KB。"
    explanation: |
      這項敘述是錯誤的，因為 FastCommit 採用極其精簡的邏輯標籤紀錄操作，單次 append 4 KB 所產生的日誌量僅約 168 bytes，遠小於一個 4 KB 區塊。
