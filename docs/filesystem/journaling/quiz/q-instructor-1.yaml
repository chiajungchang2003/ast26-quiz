author: instructor
date: 2026-02-23
question: |
  在 ext4 的**有序日誌模式 (ordered journaling)** 中, 只有詮釋資料
  (metadata) 會寫入日誌 (journal), 但資料區塊 (data block) 會在
  詮釋資料的日誌提交 (commit) *之前*被強制寫入磁碟。當使用者對一個
  新寫入的檔案呼叫 `fsync()` 時, 下列哪個選項正確描述了 `fsync()`
  回傳前必須發生的事情?
options:
  - text: "只有檔案的資料區塊被刷寫 (flush); 詮釋資料可以留在日誌緩衝區中"
    explanation: |
      `fsync()` 保證資料與詮釋資料都具有持久性 (durability)。
      如果詮釋資料仍在日誌緩衝區中, 當機時可能會遺失指向該資料
      的 inode 或目錄項目 (directory entry)。
  - text: "資料區塊先寫入最終位置, 接著包含詮釋資料的日誌交易 (journal transaction) 被提交並刷寫到磁碟"
    correct: true
    explanation: |
      在有序模式中, ext4 先將資料寫入磁碟上的最終位置, 然後才
      提交詮釋資料的日誌交易 (包含 inode、區塊映射表、目錄項目)。
      `fsync()` 會等待這兩個步驟都完成, 以確保完整的持久性。
  - text: "資料與詮釋資料都先寫入日誌, 再檢查點 (checkpoint) 到最終位置"
    explanation: |
      這描述的是**完整日誌模式 (full journaling / journal mode)**,
      而非有序模式。在有序模式中, 只有詮釋資料寫入日誌 — 資料
      直接寫入最終位置。
  - text: "檔案的詮釋資料先提交到日誌, 然後資料區塊才寫入最終位置"
    explanation: |
      這顛倒了順序保證。在有序模式中, 資料*必須*先到達磁碟,
      然後才提交詮釋資料。否則, 若在詮釋資料提交後、資料寫入前
      發生當機, 有效的詮釋資料將指向過時或垃圾資料區塊。
