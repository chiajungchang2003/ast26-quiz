author: chiajungchang2003
date: 2026-05-29
question: |
  假設一個 workload 每秒執行 1000 次 append 4 KB 並呼叫 fsync()，總共執行 5 秒。請問 JBD2 與 FastCommit 每秒平均寫入日誌量的比例最接近下列何者 (四捨五入至個位數)？

options:
  - text: " 139 : 1"
    correct: true
    explanation: |
      正確。因為 Fastcommit 仍然保留每 5 秒做一次 slow commit 的機制，所以在這個 workload 下， JBD2 平均每秒寫入的 byte 量是 5000 次 append * 24KB / 5 = 24,000KB/s ，而 FastCommit 每秒寫入的 byte 量是 [168 bytes * 5000 次 append + 24KB * 1 (每五秒一次的 slow commit)] / 5 = 172.8 KB/s，所以比例大約是 139 : 1
  - text: "143 : 1"
    explanation: |
      錯誤。這是 append workload 只計算 FCLog 部分（不含 slow commit）時的錯誤估算。JBD2 平均每秒寫入的 byte 量是 5000 次 append * 24KB / 5 = 24,000KB/s ，而 FastCommit 每秒寫入 FCLog 的 byte 量是 [168 bytes * 5000 次 append] / 5 = 168 KB/s，得到的比例大約是 143 : 1
  - text: "142 : 1"
    explanation: |
      錯誤。這是 rename workload 的比例。因為每次 rename 都會產生 28KB 的 journal 寫入，所以 JBD2 每秒寫入的 byte 量是 1000 次 rename * 28KB = 28,000KB/s，而 FastCommit 每秒寫入的 byte 量是 [192 bytes * 5000 次 的 rename FCLog + 28KB * 1 (每五秒一次的 slow commit)] / 5 = 197.6 KB/s，所以比例大約是 142 : 1 。
  - text: "146 : 1"
    explanation: |
      錯誤。這是 rename workload 只計算 FCLog 得出的比例。JBD2 每秒寫入的 byte 量是 1000 次 rename * 28KB = 28,000KB/s，而 FastCommit 每秒寫入的 byte 量是 [192 bytes * 5000 次 的 rename FCLog] / 5 = 192 KB/s，所以比例大約是 146 : 1 。
